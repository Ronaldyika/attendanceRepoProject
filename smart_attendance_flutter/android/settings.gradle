pluginManagement {
    def flutterSdkPath = new Properties()
    file('local.properties').withReader('UTF-8') { reader ->
        flutterSdkPath.load(reader)
    }
    def flutterSdk = flutterSdkPath.getProperty('flutter.sdk')
    assert flutterSdk != null, "flutter.sdk not set in local.properties"

    includeBuild("$flutterSdk/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    plugins {
        id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
        id 'com.android.application' version '8.11.1' apply false
        id 'org.jetbrains.kotlin.android' version '2.2.20' apply false
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = 'smart_attendance_flutter'
include ':app'
